<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Particle Morphing - Fast Version</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #030305;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        #webgl-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        #top-status {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #d1d5db;
            background: rgba(20, 25, 45, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 24px;
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            font-size: 14px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        #morphing-text {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 12px;
            letter-spacing: 2px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s ease;
        }

        #bottom-controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        #change-shape-btn {
            background: rgba(30, 64, 175, 0.5);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(147, 197, 253, 0.3);
            padding: 12px 36px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            letter-spacing: 1px;
        }

        #change-shape-btn:hover {
            background: rgba(37, 99, 235, 0.7);
            transform: translateY(-2px);
            box-shadow: 0 6px 25px rgba(59, 130, 246, 0.4);
            border-color: rgba(147, 197, 253, 0.6);
        }

        #change-shape-btn:active {
            transform: translateY(1px);
        }

        #color-palettes {
            display: flex;
            background: rgba(15, 20, 35, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 12px 24px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            gap: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .color-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), border-color 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .color-btn:hover {
            transform: scale(1.2);
        }

        .color-btn.active {
            transform: scale(1.3);
            border-color: white;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        #color-1 { background: linear-gradient(135deg, #ff4e00, #ec9f05); } 
        #color-2 { background: linear-gradient(135deg, #00f2fe, #4facfe); } 
        #color-3 { background: linear-gradient(135deg, #43e97b, #38f9d7); } 
        #color-4 { background: linear-gradient(135deg, #ff0844, #ffb199, #130cb7, #52e5e7); } 

    </style>
</head>
<body>

    <div id="top-status">Shape: Sphere (Click to morph)</div>
    <div id="morphing-text">Morphing...</div>
    
    <div id="bottom-controls">
        <button id="change-shape-btn">Change Shape</button>
        <div id="color-palettes">
            <div class="color-btn active" id="color-1" data-palette="0"></div>
            <div class="color-btn" id="color-2" data-palette="1"></div>
            <div class="color-btn" id="color-3" data-palette="2"></div>
            <div class="color-btn" id="color-4" data-palette="3"></div>
        </div>
    </div>

    <div id="webgl-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        const PARTICLE_COUNT = 35000; 
        const SHAPES =['Sphere', 'Cube', 'Pyramid', 'Torus', 'Galaxy', 'Wave'];
        const RADIUS = 20;

        let scene, camera, renderer, particles, starfield;
        let currentShapeIndex = 0;
        let isMorphing = false;
        
        let positions, targetPositions;
        let colors, targetColors;
        let baseGrid; 

        // 修复了数组排版问题，确保每组颜色都被正确识别
        const PALETTES = [[new THREE.Color(0xff4e00), new THREE.Color(0xec9f05)],[new THREE.Color(0x4facfe), new THREE.Color(0x00f2fe)],[new THREE.Color(0x38f9d7), new THREE.Color(0x43e97b)],[new THREE.Color(0xff0844), new THREE.Color(0x130cb7), new THREE.Color(0x52e5e7)] 
        ];
        let currentPaletteIndex = 0;

        const topStatus = document.getElementById('top-status');
        const morphingText = document.getElementById('morphing-text');
        const changeShapeBtn = document.getElementById('change-shape-btn');
        const colorBtns = document.querySelectorAll('.color-btn');

        let time = 0; 

        init();
        animate();

        function init() {
            const container = document.getElementById('webgl-container');

            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x030305, 0.008); 
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 60;
            camera.position.y = 10;
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            container.appendChild(renderer.domElement);

            createStarfield();

            const geometry = new THREE.BufferGeometry();
            
            positions = new Float32Array(PARTICLE_COUNT * 3);
            targetPositions = new Float32Array(PARTICLE_COUNT * 3);
            colors = new Float32Array(PARTICLE_COUNT * 3);
            targetColors = new Float32Array(PARTICLE_COUNT * 3);
            baseGrid = new Float32Array(PARTICLE_COUNT * 2);

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                baseGrid[i * 2] = (Math.random() - 0.5) * 60; 
                baseGrid[i * 2 + 1] = (Math.random() - 0.5) * 60; 
            }

            calculateShapePositions(0);
            updateTargetColors();
            
            for (let i = 0; i < positions.length; i++) {
                positions[i] = targetPositions[i];
                colors[i] = targetColors[i];
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.35,
                vertexColors: true,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending, 
                depthWrite: false, 
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            window.addEventListener('resize', onWindowResize);
            changeShapeBtn.addEventListener('click', nextShape);
            
            colorBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    colorBtns.forEach(b => b.classList.remove('active'));
                    const targetBtn = e.currentTarget; // 确保获取的是按钮本身
                    targetBtn.classList.add('active');
                    currentPaletteIndex = parseInt(targetBtn.getAttribute('data-palette'));
                    updateTargetColors(); // 触发颜色更新
                });
            });
        }

        function createStarfield() {
            const starsGeo = new THREE.BufferGeometry();
            const starsCount = 4000;
            const starPos = new Float32Array(starsCount * 3);
            const starColors = new Float32Array(starsCount * 3);

            for (let i = 0; i < starsCount; i++) {
                starPos[i * 3] = (Math.random() - 0.5) * 500;
                starPos[i * 3 + 1] = (Math.random() - 0.5) * 500;
                starPos[i * 3 + 2] = (Math.random() - 0.5) * 500 - 100; 
                
                const brightness = Math.random() * 0.4 + 0.1;
                starColors[i * 3] = brightness;
                starColors[i * 3 + 1] = brightness * 0.95;
                starColors[i * 3 + 2] = brightness * 0.8;
            }

            starsGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
            starsGeo.setAttribute('color', new THREE.BufferAttribute(starColors, 3));

            const starsMat = new THREE.PointsMaterial({
                size: 0.4,
                vertexColors: true,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            starfield = new THREE.Points(starsGeo, starsMat);
            scene.add(starfield);
        }

        function nextShape() {
            if (isMorphing) return;
            
            currentShapeIndex = (currentShapeIndex + 1) % SHAPES.length;
            const shapeName = SHAPES[currentShapeIndex];
            
            topStatus.innerText = `Shape: ${shapeName} (Click to morph)`;
            morphingText.style.opacity = 1;
            isMorphing = true;

            calculateShapePositions(currentShapeIndex);
            updateTargetColors();

            // 按钮冷却时间：从 1500 毫秒大幅缩短至 800 毫秒，换形状更快
            setTimeout(() => {
                morphingText.style.opacity = 0;
                isMorphing = false;
            }, 800);
        }

        function calculateShapePositions(index) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                let x, y, z;

                switch(index) {
                    case 0: // Sphere
                        const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                        const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                        const r = RADIUS * (0.8 + Math.random() * 0.2); 
                        x = r * Math.cos(theta) * Math.sin(phi);
                        y = r * Math.sin(theta) * Math.sin(phi);
                        z = r * Math.cos(phi);
                        break;
                        
                    case 1: // Cube
                        const size = RADIUS * 0.9;
                        x = (Math.random() - 0.5) * size * 2;
                        y = (Math.random() - 0.5) * size * 2;
                        z = (Math.random() - 0.5) * size * 2;
                        const maxAbs = Math.max(Math.abs(x), Math.abs(y), Math.abs(z));
                        const faceThick = 1 + (Math.random() * 0.1);
                        if (maxAbs === Math.abs(x)) x = Math.sign(x) * size * faceThick;
                        else if (maxAbs === Math.abs(y)) y = Math.sign(y) * size * faceThick;
                        else z = Math.sign(z) * size * faceThick;
                        break;

                    case 2: // Pyramid
                        const h = RADIUS * 1.5;
                        y = Math.random() * h - h / 2;
                        const progress = (y + h / 2) / h; 
                        const currentSize = RADIUS * (1 - progress);
                        x = (Math.random() - 0.5) * currentSize * 2;
                        z = (Math.random() - 0.5) * currentSize * 2;
                        if(Math.random() > 0.5) {
                            if(Math.random() > 0.5) x = Math.sign(x || 1) * currentSize;
                            else z = Math.sign(z || 1) * currentSize;
                        }
                        if(progress < 0.05 && Math.random() > 0.5) y = -h/2;
                        break;

                    case 3: // Torus
                        const t = Math.random() * Math.PI * 2;
                        const p = Math.random() * Math.PI * 2;
                        const R = RADIUS * 0.8; 
                        const tube = RADIUS * 0.35 + Math.random() * 2; 
                        x = (R + tube * Math.cos(p)) * Math.cos(t);
                        y = tube * Math.sin(p);
                        z = (R + tube * Math.cos(p)) * Math.sin(t);
                        break;

                    case 4: // Galaxy
                        const arms = 5;
                        const armIndex = i % arms;
                        const armAngle = (armIndex / arms) * Math.PI * 2;
                        const dist = Math.random() * RADIUS * 1.8;
                        const spiral = dist * 0.15;
                        x = Math.cos(armAngle + spiral) * dist + (Math.random() - 0.5) * 4;
                        y = (Math.random() - 0.5) * (RADIUS * 1.5 - dist) * 0.15; 
                        z = Math.sin(armAngle + spiral) * dist + (Math.random() - 0.5) * 4;
                        break;

                    case 5: // Wave
                        x = baseGrid[i * 2];
                        z = baseGrid[i * 2 + 1];
                        y = 0; 
                        break;
                }

                targetPositions[i3] = x;
                targetPositions[i3 + 1] = y;
                targetPositions[i3 + 2] = z;
            }
        }

        function updateTargetColors() {
            const palette = PALETTES[currentPaletteIndex];
            const colorA = palette[0];
            const colorB = palette[1];
            const colorC = palette[2] || palette[1]; 

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                let factor;

                if (currentShapeIndex === 2) { 
                    factor = (targetPositions[i3 + 1] + RADIUS) / (RADIUS * 2);
                } else if (currentShapeIndex === 4) {
                    const dist = Math.sqrt(targetPositions[i3]**2 + targetPositions[i3+2]**2);
                    factor = dist / (RADIUS * 1.8);
                } else if (currentShapeIndex === 5) {
                    factor = (targetPositions[i3] + targetPositions[i3+2] + 60) / 120;
                } else {
                    factor = i / PARTICLE_COUNT;
                }

                factor = Math.max(0, Math.min(1, factor));

                let finalColor;
                if (palette.length > 2 && factor > 0.5) {
                    finalColor = colorB.clone().lerp(colorC, (factor - 0.5) * 2);
                } else if (palette.length > 2) {
                    finalColor = colorA.clone().lerp(colorB, factor * 2);
                } else {
                    finalColor = colorA.clone().lerp(colorB, factor);
                }

                // 限制颜色范围在 0~1 之间，防止过曝
                finalColor.r = Math.max(0, Math.min(1, finalColor.r + (Math.random() - 0.5) * 0.1));
                finalColor.g = Math.max(0, Math.min(1, finalColor.g + (Math.random() - 0.5) * 0.1));
                finalColor.b = Math.max(0, Math.min(1, finalColor.b + (Math.random() - 0.5) * 0.1));

                targetColors[i3] = finalColor.r;
                targetColors[i3 + 1] = finalColor.g;
                targetColors[i3 + 2] = finalColor.b;
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            time += 0.02;

            const posAttribute = particles.geometry.attributes.position;
            const colAttribute = particles.geometry.attributes.color;

            particles.rotation.y += 0.002;
            particles.rotation.z = Math.sin(time * 0.2) * 0.05;
            
            starfield.rotation.y -= 0.0005;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const i3 = i * 3;

                if (currentShapeIndex === 5) {
                    const x = baseGrid[i * 2];
                    const z = baseGrid[i * 2 + 1];
                    const y = Math.sin(x * 0.1 + time) * 4 + Math.cos(z * 0.1 - time * 0.8) * 4;
                    targetPositions[i3 + 1] = y; 
                }

                // 动画速度核心修改区：将插值从 0.06 提升到了 0.12，变形更快
                positions[i3] += (targetPositions[i3] - positions[i3]) * 0.12;
                positions[i3 + 1] += (targetPositions[i3 + 1] - positions[i3 + 1]) * 0.12;
                positions[i3 + 2] += (targetPositions[i3 + 2] - positions[i3 + 2]) * 0.12;

                // 颜色的过渡速度也从 0.1 提升到了 0.15
                colors[i3] += (targetColors[i3] - colors[i3]) * 0.15;
                colors[i3 + 1] += (targetColors[i3 + 1] - colors[i3 + 1]) * 0.15;
                colors[i3 + 2] += (targetColors[i3 + 2] - colors[i3 + 2]) * 0.15;
            }

            posAttribute.needsUpdate = true;
            colAttribute.needsUpdate = true;

            camera.position.y = 10 + Math.sin(time * 0.5) * 2;
            camera.lookAt(0, 0, 0);

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
